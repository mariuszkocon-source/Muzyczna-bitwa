<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC Battle: Pixel Edition</title>
    <style>
        * { user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: 'Arial Black', sans-serif; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; }
        #overlay h1 { font-size: 50px; text-shadow: 0 0 20px #ffbb00; margin-bottom: 20px; text-align: center; color: #ffbb00; }
        #start-btn { padding: 20px 50px; font-size: 24px; background: #ffbb00; border: 3px solid #fff; border-radius: 10px; cursor: pointer; color: black; font-weight: bold; box-shadow: 0 0 30px #ffbb00; }
        #overlay p { margin-top: 15px; font-size: 14px; opacity: 0.7; }
        
        #wrapper { position: relative; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; }
        canvas { border: 2px solid #333; background: #050505; max-width: 100%; max-height: 80vh; object-fit: contain; }
        
        .ui { position: absolute; top: 10%; width: 90%; left: 5%; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .vibe-bar { width: 35%; height: 15px; background: rgba(255,255,255,0.1); border: 1px solid #fff; position: relative; }
        .vibe-fill { height: 100%; width: 100%; transition: width 0.2s; }
        #playerVibe { background: linear-gradient(90deg, #ff4e00, #ec9f05); box-shadow: 0 0 15px #ff4e00; }
        #enemyVibe { background: linear-gradient(90deg, #00d2ff, #3a7bd5); box-shadow: 0 0 15px #00d2ff; }
        
        #controls { position: absolute; bottom: 5%; width: 90%; left: 5%; display: flex; justify-content: space-between; z-index: 20; }
        .btn-group { display: flex; gap: 20px; }
        .touch-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 35px; touch-action: manipulation; }
        .touch-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        #btn-attack { border-color: #ffbb00; color: #ffbb00; font-size: 45px; }
        #btn-jump { border-color: #00e1ff; color: #00e1ff; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>TC BATTLE</h1>
        <button id="start-btn">START GAME</button>
        <p>(Tap, aby aktywować bitwę i muzykę)</p>
    </div>

    <div id="wrapper">
        <div class="ui">
            <div class="vibe-bar"><div id="playerVibe" class="vibe-fill"></div></div>
            <div class="vibe-bar">
