<script>
// ... (reszta kodu bez zmian) ...

function loop() {
    ctx.clearRect(0, 0, 1024, 576);

    // Ruch lewo/prawo
    if(keys.l && player.x > 0) player.x -= 8;
    if(keys.r && player.x < 850) player.x += 8;

    // Grawitacja
    player.y += player.vy;
    player.vy += 1.5; 

    // IDEALNE LĄDOWANIE - to naprawia przeskakiwanie obrazu
    if(player.y >= 320) { 
        player.y = 320; 
        player.vy = 0; // Resetujemy prędkość do zera
    }

    // --- NAPRAWIONA LOGIKA GRAFIKI ---
    let currentImg = imgIdle; // Domyślnie chud.jpg

    // 1. Atak ma najwyższy priorytet
    if (player.state === 'punch') {
        currentImg = imgPunch;
    } 
    // 2. Skok włącza się TYLKO gdy postać jest wyraźnie NAD ziemią
    // Dodajemy warunek player.y < 315, żeby uniknąć migotania na styku z ziemią
    else if (player.y < 315) {
        currentImg = imgJump;
    }
    // 3. W każdym innym przypadku (stanie, chodzenie) zostaje chud.jpg

    // Rysowanie
    if(currentImg.complete) {
        ctx.drawImage(currentImg, player.x, player.y, 220, 260);
    }

    // Przeciwnik i reszta...
    ctx.fillStyle = '#00e1ff';
    ctx.fillRect(enemy.x, enemy.y + 50, 120, 210);

    requestAnimationFrame(loop);
}
</script>
