<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC BATTLE: Czyste Grafiki</title>
    <style>
        * { user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #start-btn { padding: 20px 40px; font-size: 24px; background: #ffbb00; border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #wrapper { position: relative; width: 100%; height: 100%; display: none; }
        canvas { background: #050505; width: 100%; height: 100%; object-fit: contain; }
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; }
        .hp-bar { width: 40%; height: 20px; background: #333; border: 2px solid #fff; }
        .hp-fill { height: 100%; width: 100%; transition: 0.2s; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; color: white; touch-action: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:#ffbb00; font-size: 40px;">TC BATTLE</h1>
        <button id="start-btn">START bitwę!</button>
    </div>

    <div id="wrapper">
        <div class="ui">
            <div class="hp-bar"><div id="p1-hp" class="hp-fill" style="background: #ffbb00;"></div></div>
            <div class="hp-bar"><div id="p2-hp" class="hp-fill" style="background: #00e1ff;"></div></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <div style="display:flex; gap:15px;">
                <div class="btn" id="btn-left">◀</div>
                <div class="btn" id="btn-right">▶</div>
            </div>
            <div style="display:flex; gap:15px;">
                <div class="btn" id="btn-jump" style="color:#00e1ff">↑</div>
                <div class="btn" id="btn-attack" style="color:#ffbb00">♪</div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="narkorapcore.wav" type="audio/wav">
    </audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const music = document.getElementById('bgMusic');
canvas.width = 1024; canvas.height = 576;

// --- ŁADOWANIE NOWYCH, OSOBNYCH GRAFIK ---
const coreSprites = {
    idle: new Image(),
    atk: new Image()
};
coreSprites.idle.src = 'core_idle.png';  // Grafika 1
coreSprites.atk.src = 'core_atk2.png';   // Grafika 3 (Super Atak)

const imgClassic = new Image();
imgClassic.src = 'classicpxr.jpeg'; // Tymczasowo Classic, bo jego jeszcze nie rozbiliśmy

let player = { x: 150, y: 320, vy: 0, hp: 100, atk: false, img: coreSprites.idle };
let enemy = { x: 700, y: 320, vy: 0, hp: 100 };
let keys = { l: false, r: false };
let gameActive = true;

document.getElementById('start-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('wrapper').style.display = 'block';
    music.play().catch(e => console.log("Błąd audio:", e));
    animate();
};

function animate() {
    ctx.clearRect(0,0,1024,576);
    
    // Ruch Gracza 1
    if(keys.l) player.x -= 8; if(keys.r) player.x += 8;
    player.y += player.vy; player.vy += 1;
    if(player.y > 320) { player.y = 320; player.vy = 0; }
    
    // AI przeciwnika
    if(enemy.x > player.x + 180) enemy.x -= 3; else if(enemy.x < player.x - 180) enemy.x += 3;
    
    // ZMIANA GRAFIKI PRZY ATAKU
    player.img = player.atk ? coreSprites.atk : coreSprites.idle;

    // --- CZYSTE RYSOWANIE (Bez wycinania!) ---
    // Rysujemy całe obrazki
    ctx.drawImage(player.img, player.x, player.y, 180, 240);
    
    // Enemy (wciąż wycinany, póki nie rozbijemy Classica)
    ctx.drawImage(imgClassic, 10, 10, 180, 250, enemy.x, enemy.y, 180, 240);
    
    // Atak nutką
    if(player.atk) {
        ctx.fillStyle = "#ffbb00"; ctx.font = "80px Arial";
        ctx.fillText("♪", player.x + 150, player.y + 100);
    }

    if(enemy.hp > 0 && gameActive) requestAnimationFrame(animate);
    else if (gameActive) {
        gameActive = false;
        ctx.fillStyle = "white"; ctx.font = "60px Arial"; ctx.textAlign = "center";
        ctx.fillText("CORE WYGRAŁ!", 512, 288);
    }
}

// Sterowanie dotykowe (Poprawione)
const bind = (id, action) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); action(true); });
    el.addEventListener('touchend', (e) => { e.preventDefault(); action(false); });
};

bind('btn-left', (v) => keys.l = v);
bind('btn-right', (v) => keys.r = v);

document.getElementById('btn-jump').ontouchstart = (e) => { 
    e.preventDefault(); 
    if(player.vy === 0) player.vy = -22; 
};

document.getElementById('btn-attack').ontouchstart = (e) => { 
    e.preventDefault(); 
    doAttack(); 
};

function doAttack() {
    if(!gameActive) return;
    player.atk = true;
    if(Math.abs(player.x - enemy.x) < 250) {
        enemy.hp -= 10;
        document.getElementById('p2-hp').style.width = enemy.hp + "%";
    }
    setTimeout(() => player.atk = false, 200);
}
</script>
</body>
</html>
