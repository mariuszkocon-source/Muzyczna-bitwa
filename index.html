<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC Battle: Pixel Edition</title>
    <style>
        * { user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #start-btn { padding: 20px 50px; font-size: 24px; background: #ffbb00; border: none; border-radius: 10px; cursor: pointer; color: black; font-weight: bold; }
        
        #wrapper { position: relative; width: 100%; height: 100%; display: none; }
        canvas { background: #050505; width: 100%; height: 100%; object-fit: contain; }
        
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .hp-bg { width: 40%; height: 20px; background: #333; border: 2px solid #fff; }
        .hp-fill { height: 100%; width: 100%; transition: 0.2s; }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 20; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; color: white; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:#ffbb00; font-size: 40px;">TC BATTLE</h1>
        <button id="start-btn">ODPALAJ BITWĘ!</button>
    </div>

    <div id="wrapper">
        <div class="ui">
            <div class="hp-bg"><div id="p1-hp" class="hp-fill" style="background: #ffbb00;"></div></div>
            <div class="hp-bg"><div id="p2-hp" class="hp-fill" style="background: #00e1ff;"></div></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <div style="display:flex; gap:15px;">
                <div class="btn" id="l">◀</div>
                <div class="btn" id="r">▶</div>
            </div>
            <div style="display:flex; gap:15px;">
                <div class="btn" id="j" style="color:#00e1ff">↑</div>
                <div class="btn" id="a" style="color:#ffbb00">♪</div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="narkorapcore.wav" type="audio/wav">
    </audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const music = document.getElementById('bgMusic');
canvas.width = 1024; canvas.height = 576;

const imgCore = new Image(); imgCore.src = 'corepxl.jpeg';
const imgClassic = new Image(); imgClassic.src = 'classicpxr.jpeg';

let p1 = { x: 100, y: 300, vy: 0, hp: 100, atk: false };
let p2 = { x: 700, y: 300, vy: 0, hp: 100 };
let keys = { l: false, r: false };

document.getElementById('start-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('wrapper').style.display = 'block';
    music.play();
    update();
};

function update() {
    ctx.clearRect(0,0,1024,576);
    
    // Ruch Gracza 1
    if(keys.l) p1.x -= 8; if(keys.r) p1.x += 8;
    p1.y += p1.vy; p1.vy += 1;
    if(p1.y > 300) { p1.y = 300; p1.vy = 0; }
    
    // AI przeciwnika
    if(p2.x > p1.x + 180) p2.x -= 3; else if(p2.x < p1.x - 180) p2.x += 3;
    p2.y += p2.vy; p2.vy += 1;
    if(p2.y > 300) { p2.y = 300; p2.vy = 0; }

    // --- KLUCZOWA ZMIANA: WYCINANIE JEDNEJ POSTACI (1/4 obrazka) ---
    // Pobieramy tylko fragment o szerokości 150px i wysokości 200px z lewego górnego rogu
    ctx.drawImage(imgCore, 0, 0, 150, 200, p1.x, p1.y, 220, 300);
    ctx.drawImage(imgClassic, 0, 0, 150, 200, p2.x, p2.y, 220, 300);
    
    if(p1.atk) {
        ctx.fillStyle = "#ffbb00"; ctx.font = "80px Arial";
        ctx.fillText("♪", p1.x + 150, p1.y + 100);
    }

    if(p2.hp > 0) requestAnimationFrame(update);
    else {
        ctx.fillStyle = "white"; ctx.font = "60px Arial"; ctx.textAlign = "center";
        ctx.fillText("CORE WYGRAŁ!", 512, 288);
    }
}

const bind = (id, k) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { 
        e.preventDefault(); 
        if(k==='j'){ if(p1.vy===0) p1.vy=-25; }
        else if(k==='a'){ 
            p1.atk = true; 
            if(Math.abs(p1.x - p2.x) < 250) {
                p2.hp -= 10;
                document.getElementById('p2-hp').style.width = p2.hp + "%";
            }
            setTimeout(()=>p1.atk=false, 200);
        }
        else keys[k]=true; 
    };
    el.ontouchend = (e) => { e.preventDefault(); if(k!=='j' && k!=='a') keys[k]=false; };
};
bind('l', 'l'); bind('r', 'r'); bind('j', 'j'); bind('a', 'a');
</script>
</body>
</html>
