<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC BATTLE: FIX</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        canvas { background: #111; flex-grow: 1; width: 100%; object-fit: contain; }
        #controls { height: 150px; display: flex; justify-content: space-around; align-items: center; background: #222; }
        .btn { width: 80px; height: 80px; background: #444; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        <div class="btn" id="btn-l">◀</div>
        <div class="btn" id="btn-r">▶</div>
        <div class="btn" id="btn-j" style="color:#00e1ff">↑</div>
        <div class="btn" id="btn-a" style="color:#ffbb00">♪</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1024; 
canvas.height = 576;

// DOKŁADNE NAZWY Z TWOJEGO GITHUBA
const imgIdle = new Image(); imgIdle.src = 'chud.jpg';
const imgJump = new Image(); imgJump.src = 'jump.jpg';
const imgPunch = new Image(); imgPunch.src = 'punch.jpg';

let p1 = { x: 100, y: 300, vy: 0, state: 'idle' };
let keys = { l: false, r: false };

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grawitacja i ruch
    if(keys.l) p1.x -= 7;
    if(keys.r) p1.x += 7;
    p1.y += p1.vy;
    p1.vy += 1;
    if(p1.y > 300) { p1.y = 300; p1.vy = 0; }

    // Wybór obrazka
    let currentImg = imgIdle;
    if (p1.vy < 0 || p1.vy > 0) currentImg = imgJump;
    if (p1.state === 'punch') currentImg = imgPunch;

    // Rysowanie postaci
    if(currentImg.complete) {
        ctx.drawImage(currentImg, p1.x, p1.y, 250, 250);
    } else {
        // Czerwony kwadrat jeśli obrazek się nie wczytał
        ctx.fillStyle = "red";
        ctx.fillRect(p1.x, p1.y, 100, 100);
    }

    requestAnimationFrame(loop);
}

// Obsługa dotyku
const input = (id, type) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => {
        e.preventDefault();
        if(type === 'l') keys.l = true;
        if(type === 'r') keys.r = true;
        if(type === 'j' && p1.vy === 0) p1.vy = -20;
        if(type === 'a') {
            p1.state = 'punch';
            setTimeout(() => p1.state = 'idle', 300);
        }
    };
    el.ontouchend = () => { keys.l = false; keys.r = false; };
};

input('btn-l', 'l'); input('btn-r', 'r');
input('btn-j', 'j'); input('btn-a', 'a');

loop();
</script>
</body>
</html>
