<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC BATTLE: SELECT & FIGHT</title>
    <style>
        * { user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; color: white; font-family: 'Courier New', monospace; }
        
        /* EKRANY */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: #000; }
        #start-screen { background: url('title.png') no-repeat center; background-size: contain; }
        #select-screen { display: none; background: url('select_screen.png') no-repeat center; background-size: contain; }
        #game-wrapper { display: none; width: 100%; height: 100%; position: relative; }

        /* UI WYBORU */
        .select-container { display: flex; gap: 50px; margin-top: 20%; }
        .char-card { width: 150px; height: 200px; border: 4px solid #444; cursor: pointer; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.8); }
        .char-card:hover { border-color: #fff; transform: scale(1.1); }
        .char-card img { width: 100%; height: auto; }

        /* INTERFEJS WALKI */
        .ui-top { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; }
        .hp-container { width: 40%; display: flex; flex-direction: column; }
        .hp-bar { height: 25px; background: #333; border: 3px solid #fff; position: relative; }
        .hp-fill { height: 100%; transition: width 0.2s; }
        #timer { font-size: 40px; font-weight: bold; text-shadow: 2px 2px #000; }

        canvas { background: #050505; width: 100%; flex-grow: 1; object-fit: contain; }
        #controls { height: 160px; display: flex; justify-content: space-around; align-items: center; background: #111; padding: 10px; }
        .btn { width: 75px; height: 75px; background: #333; border: 4px solid #777; color: white; display: flex; justify-content: center; align-items: center; font-size: 30px; touch-action: none; }
        .btn:active { background: #555; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <button onclick="showSelect()" style="margin-top:60%; padding:20px 40px; font-size:30px; background:#ffbb00; border:none; font-weight:bold;">START</button>
    </div>

    <div id="select-screen" class="screen">
        <h2 style="font-size:30px; color:#ffbb00;">WYBIERZ WOJOWNIKA</h2>
        <div class="select-container">
            <div class="char-card" onclick="startGame('core')">
                <img src="face_core.png" alt="CORE">
                <p>CORE</p>
            </div>
            <div class="char-card" onclick="startGame('classic')">
                <img src="face_classic.png" alt="CLASSIC">
                <p>CLASSIC</p>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <div class="ui-top">
            <div class="hp-container">
                <div class="hp-bar"><div id="hp-left" class="hp-fill" style="background:#ffbb00; width:100%;"></div></div>
                <span id="name-left">CORE</span>
            </div>
            <div id="timer">30</div>
            <div class="hp-container">
                <div class="hp-bar"><div id="hp-right" class="hp-fill" style="background:#00e1ff; width:100%;"></div></div>
                <span id="name-right" style="text-align:right;">CLASSIC</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <div class="btn" id="btn-l">◀</div>
            <div class="btn" id="btn-r">▶</div>
            <div class="btn" id="btn-j">↑</div>
            <div class="btn" id="btn-a">♪</div>
        </div>
    </div>

    <audio id="music-core" loop><source src="narkorapcore.wav" type="audio/wav"></audio>
    <audio id="music-classic" loop><source src="narkorapclassic.mp3" type="audio/mpeg"></audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1024; canvas.height = 576;

// KONFIGURACJA ZGODNIE ZE SPISEM
const config = {
    core: { 
        name: "CORE", maxHp: 150, music: 'music-core', 
        img: { idle:'idle_c.jpg', walk:'walk_c.jpg', jump:'jump_c.jpg', block:'crouch_c.jpg', p1:'punch1_c.jpg', pf1:'punch_fire1_c.jpg', pf2:'punch_fire2_c.jpg', win:'win.jpg' }
    },
    classic: { 
        name: "CLASSIC", maxHp: 170, music: 'music-classic', 
        img: { idle:'idle.jpg', walk:'walk.jpg', jump:'jump.jpg', block:'crouch.jpg', p1:'punch1.jpg', pf1:'punch_fire1.jpg', pf2:'punch_fire2.jpg', win:'win.jpg' }
    }
};

let p1, p2, gameTimer = 30, gameActive = false, attackHoldTime = 0;

function showSelect() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('select-screen').style.display = 'flex';
}

function startGame(choice) {
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('game-wrapper').style.display = 'block';

    // Inicjalizacja Postaci (Core zawsze po lewej)
    p1 = { ...config.core, x: 150, y: 320, vy: 0, hp: 150, state: 'idle', isPlayer: choice === 'core' };
    p2 = { ...config.classic, x: 750, y: 320, vy: 0, hp: 170, state: 'idle', isPlayer: choice === 'classic' };

    // Muzyka
    document.getElementById(config[choice].music).play();
    
    gameActive = true;
    startClock();
    loop();
}

function startClock() {
    let t = setInterval(() => {
        if(!gameActive) { clearInterval(t); return; }
        gameTimer--;
        document.getElementById('timer').innerText = gameTimer;
        if(gameTimer <= 0) endGame("REMIS!");
    }, 1000);
}

// Ładowanie obrazków do obiektów
function loadImg(p) {
    p.images = {};
    for(let key in p.img) {
        p.images[key] = new Image();
        p.images[key].src = p.img[key];
    }
}

function loop() {
    if(!gameActive) return;
    ctx.clearRect(0, 0, 1024, 576);

    updatePlayer(p1, p2);
    updateAI(p2, p1); // Proste AI dla Classic jeśli wybierzesz Core

    drawChar(p1);
    drawChar(p2);

    requestAnimationFrame(loop);
}

function updatePlayer(p, enemy) {
    // Grawitacja i ruch... (uproszczone dla czytelności)
    p.y += p.vy; p.vy += 1.5;
    if(p.y >= 320) { p.y = 320; p.vy = 0; }

    // Mechanika Ataku
    if(p.state === 'punch_hold') {
        attackHoldTime++;
        if(attackHoldTime > 30) p.state = 'pf2'; // Mega Punch
    }

    // Wykrywanie Kolizji i Obrażeń
    let dist = Math.abs(p.x - enemy.x);
    if(p.state.includes('pf') && dist < 200 && enemy.state !== 'block') {
        let dmg = (p.name === "CORE") ? (p.state === 'pf2' ? 25 : 15) : (p.state === 'pf2' ? 20 : 10);
        enemy.hp -= dmg;
        updateUI();
        p.state = 'idle'; // Reset po trafieniu
        if(enemy.hp <= 0) endGame(p.name + " WYGRYWA!");
    }
}

function drawChar(p) {
    let img = p.images[p.state] || p.images.idle;
    if(img.complete) {
        // Skalowanie postaci
        ctx.drawImage(img, p.x, p.y, 220, 260);
    }
}

function updateUI() {
    document.getElementById('hp-left').style.width = (p1.hp / p1.maxHp * 100) + "%";
    document.getElementById('hp-right').style.width = (p2.hp / p2.maxHp * 100) + "%";
}

function endGame(msg) {
    gameActive = false;
    ctx.fillStyle = "white"; ctx.font = "60px Arial"; ctx.textAlign = "center";
    ctx.fillText(msg, 512, 288);
}

// STEROWANIE
const btnA = document.getElementById('btn-a');
btnA.onpointerdown = () => { p1.state = 'punch_hold'; attackHoldTime = 0; };
btnA.onpointerup = () => {
    let dist = Math.abs(p1.x - p2.x);
    if(dist > 200) p1.state = 'p1'; // Punch1 bez kontaktu
    else if(attackHoldTime > 30) p1.state = 'pf2';
    else p1.state = 'pf1';
    setTimeout(() => p1.state = 'idle', 300);
};

// Dodaj resztę listenerów dla strzałek...
</script>
</body>
    </html>
