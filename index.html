<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC BATTLE - FIXED</title>
    <style>
        * { user-select: none; box-sizing: border-box; -webkit-touch-callout: none; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
        #game-wrapper { display: none; flex-grow: 1; position: relative; flex-direction: column; }
        
        .ui-top { display: flex; justify-content: space-between; padding: 10px; width: 100%; position: absolute; top: 0; }
        .hp-bar { width: 40%; height: 20px; background: #333; border: 2px solid #fff; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.2s; }
        
        canvas { background: #050505; flex-grow: 1; width: 100%; object-fit: contain; }
        
        #controls { height: 180px; background: #111; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px; }
        .btn { background: #333; border: 3px solid #777; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; touch-action: none; }
        .btn:active { background: #555; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen" style="background: url('title.png') center/contain no-repeat;">
        <button onclick="showSelect()" style="margin-top: 50%; padding: 15px 40px; font-size: 24px; background: #ffbb00; border: none; font-weight: bold;">START</button>
    </div>

    <div id="select-screen" class="screen" style="display:none;">
        <h1>WYBIERZ WOJOWNIKA</h1>
        <div style="display:flex; gap: 20px;">
            <div onclick="initGame('core')" style="cursor:pointer; text-align:center;">
                <img src="face_core.png" width="120"><p>CORE</p>
            </div>
            <div onclick="initGame('classic')" style="cursor:pointer; text-align:center;">
                <img src="face_classic.png" width="120"><p>CLASSIC</p>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <div class="ui-top">
            <div class="hp-bar"><div id="hp-left" class="hp-fill" style="background:#ffbb00;"></div></div>
            <div id="timer" style="font-size:30px;">30</div>
            <div class="hp-bar"><div id="hp-right" class="hp-fill" style="background:#00e1ff;"></div></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <div class="btn" id="l">◀</div>
            <div class="btn" id="r">▶</div>
            <div class="btn" id="j">↑</div>
            <div class="btn" id="b">🛡️</div>
            <div class="btn" id="a">🥊</div>
        </div>
    </div>

    <audio id="mus-core" loop><source src="narkorapcore.wav"></audio>
    <audio id="mus-classic" loop><source src="narkorapclassic.mp3"></audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1024; canvas.height = 576;

let player, enemy, gameActive = false, timer = 30;
const keys = { l: false, r: false };

function showSelect() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('select-screen').style.display = 'flex';
}

async function initGame(choice) {
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('game-wrapper').style.display = 'flex';

    const pType = choice === 'core' ? {hp:150, s:'_c.jpg'} : {hp:170, s:'.jpg'};
    const eType = choice === 'core' ? {hp:170, s:'.jpg'} : {hp:150, s:'_c.jpg'};

    player = { x: 200, y: 300, hp: pType.hp, max: pType.hp, suffix: pType.s, state: 'idle', vy: 0 };
    enemy = { x: 700, y: 300, hp: eType.hp, max: eType.hp, suffix: eType.s, state: 'idle', vy: 0, aiTimer: 0 };

    await Promise.all([loadSprites(player), loadSprites(enemy)]);
    
    document.getElementById(choice === 'core' ? 'mus-core' : 'mus-classic').play();
    gameActive = true;
    setInterval(() => { if(timer > 0 && gameActive) timer--; document.getElementById('timer').innerText = timer; }, 1000);
    loop();
}

function loadSprites(char) {
    char.imgs = {};
    const poses = ['idle', 'walk', 'jump', 'crouch', 'punch1', 'punch_fire1', 'punch_fire2', 'win'];
    const promises = poses.map(pose => {
        return new Promise(resolve => {
            const img = new Image();
            img.src = pose + char.suffix;
            img.onload = () => { char.imgs[pose] = img; resolve(); };
            img.onerror = () => { console.error("Błąd pliku:", img.src); resolve(); };
        });
    });
    return Promise.all(promises);
}

function loop() {
    if(!gameActive) return;
    ctx.clearRect(0,0,1024,576);

    // Gracz
    if(keys.l) { player.x -= 5; player.state = 'walk'; }
    else if(keys.r) { player.x += 5; player.state = 'walk'; }
    else if(player.state === 'walk') player.state = 'idle';

    // AI Przeciwnika
    enemy.aiTimer++;
    if(Math.abs(enemy.x - player.x) > 150) {
        enemy.x += (player.x > enemy.x ? 3 : -3);
        enemy.state = 'walk';
    } else if(enemy.aiTimer % 60 === 0) {
        enemy.state = 'punch_fire1';
        if(player.state !== 'crouch') player.hp -= 10;
        setTimeout(() => enemy.state = 'idle', 300);
    }

    draw(player);
    draw(enemy);
    updateUI();
    requestAnimationFrame(loop);
}

function draw(p) {
    const img = p.imgs[p.state] || p.imgs['idle'];
    if(img) ctx.drawImage(img, p.x, p.y, 220, 260);
}

function updateUI() {
    document.getElementById('hp-left').style.width = (player.hp/player.max*100) + "%";
    document.getElementById('hp-right').style.width = (enemy.hp/enemy.max*100) + "%";
}

// STEROWANIE
const setup = (id, k) => {
    const b = document.getElementById(id);
    b.onpointerdown = () => { if(k==='j' && player.y>=300) player.vy=-25; if(k==='b') player.state='crouch'; if(k==='l' || k==='r') keys[k]=true; };
    b.onpointerup = () => { if(k==='l' || k==='r') keys[k]=false; if(k==='b') player.state='idle'; };
};
setup('l','l'); setup('r','r'); setup('j','j'); setup('b','b');

document.getElementById('a').onpointerdown = () => {
    player.state = Math.abs(player.x - enemy.x) < 200 ? 'punch_fire1' : 'punch1';
    if(player.state === 'punch_fire1') enemy.hp -= 15;
    setTimeout(() => player.state='idle', 200);
};
</script>
</body>
</html>
