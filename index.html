<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC BATTLE FIX</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { background: #111; width: 100vw; height: 70vh; display: block; }
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; }
        .hp { width: 40%; height: 20px; border: 2px solid #fff; background: #333; }
        .fill { height: 100%; width: 100%; background: #ffbb00; }
        #controls { height: 30vh; display: flex; justify-content: space-around; align-items: center; background: #222; }
        .btn { width: 70px; height: 70px; background: #444; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; }
    </style>
</head>
<body>

<div class="ui">
    <div class="hp"><div id="hp1" class="fill"></div></div>
    <div class="hp"><div id="hp2" class="fill" style="background:#00e1ff"></div></div>
</div>

<canvas id="game"></canvas>

<div id="controls">
    <div class="btn" id="l">◀</div>
    <div class="btn" id="r">▶</div>
    <div class="btn" id="j">↑</div>
    <div class="btn" id="a">♪</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 1024; canvas.height = 576;

// WYMUSZENIE MAŁYCH LITER - DOKŁADNIE JAK NA SCREENIE
const img1 = new Image(); img1.src = 'chud.jpg';
const img2 = new Image(); img2.src = 'jump.jpg';
const img3 = new Image(); img3.src = 'punch.jpg';

let p1 = { x: 100, y: 300, vy: 0, state: 'idle' };
let keys = { l: false, r: false };

function draw() {
    ctx.clearRect(0, 0, 1024, 576);

    // Grawitacja
    if(keys.l) p1.x -= 8;
    if(keys.r) p1.x += 8;
    p1.y += p1.vy;
    p1.vy += 1.5;
    if(p1.y > 300) { p1.y = 300; p1.vy = 0; }

    // Wybór obrazka
    let pic = img1;
    if(p1.vy !== 0) pic = img2;
    if(p1.state === 'atk') pic = img3;

    // RYSOWANIE Z TESTEM
    if(pic.complete && pic.naturalWidth !== 0) {
        ctx.drawImage(pic, p1.x, p1.y, 220, 260);
    } else {
        // JEŚLI NIE MA POSTACI, NARYSUJ COŚ ŻEBY WIEDZIEĆ GDZIE JEST
        ctx.fillStyle = "yellow";
        ctx.fillRect(p1.x, p1.y, 100, 150);
        ctx.fillStyle = "white";
        ctx.fillText("ŁADOWANIE: " + pic.src.split('/').pop(), p1.x, p1.y - 10);
    }

    // Przeciwnik testowy
    ctx.fillStyle = "#00e1ff";
    ctx.fillRect(700, 350, 100, 200);

    requestAnimationFrame(draw);
}

// Sterowanie
const press = (id, act) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => {
        e.preventDefault();
        if(act==='l') keys.l = true;
        if(act==='r') keys.r = true;
        if(act==='j' && p1.vy === 0) p1.vy = -30;
        if(act==='a') { p1.state = 'atk'; setTimeout(()=>p1.state='idle', 200); }
    };
    el.ontouchend = () => { keys.l = false; keys.r = false; };
};

press('l','l'); press('r','r'); press('j','j'); press('a','a');
draw();
</script>
</body>
</html>
